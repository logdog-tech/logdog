<script>
    /* 
    * 以下脚本将页面自己包裹在iframe，
    * 用这种方式避开浏览器各种插件注入代码导致的性能变差问题
    * 但如果是爬虫，则不包裹（搜索引擎会用模拟浏览器来渲染）
    */

    function isCrawler() {
        const crawlerUserAgents = [
            'googlebot',
            'bingbot',
            'slurp',
            'duckduckbot',
            'baiduspider',
            'yandexbot',
            'facebookexternalhit',
            'twitterbot',
            'rogerbot',
            'linkedinbot',
            'embedly',
            'quora link preview',
            'showyoubot',
            'outbrain',
            'pinterest',
            'slackbot',
            'vkshare',
            'w3c_validator'
        ];
        
        const userAgent = navigator.userAgent.toLowerCase();
        return crawlerUserAgents.some(crawler => userAgent.includes(crawler));
    }
    
    // 如果不在iframe中且不是爬虫，就把自己包裹起来
    if (window.self === window.top && !isCrawler()) {
        document.body.innerHTML = '<iframe src="' + window.location.href + '" style="width:100%; height:100vh;"></iframe>';
    }
</script>
