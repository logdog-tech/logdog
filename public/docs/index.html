<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Documentation</title>
    <!-- 引入 marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .markdown-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const rawMarkdown = document.getElementById('markdown-content').innerText;
            const parsedMarkdown = marked.parse(rawMarkdown);
            document.body.innerHTML = parsedMarkdown;
        });
    </script>
</head>

<body>
    <pre id="markdown-content">
# LogDog使用手册

## 如何访问Android Logcat日志?

你可以通过以下命令，一键访问Android Logcat日志：
```
adb logcat | bash <(curl -sSL logdog.tech)
``` 

</pre>
</body>

</html>
